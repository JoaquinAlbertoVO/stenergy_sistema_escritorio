name: Deploy React App to cPanel

on:
  push:
    branches:
      - main  # Se ejecutará cada vez que subas cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Obtener el código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Puedes cambiar a la versión exacta que uses

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 📦 Construir el proyecto
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 🚀 Subir a cPanel por SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_KEY: ${{ secrets.FTP_KEY }}
          FTP_KEY_PASSPHRASE: ${{ secrets.FTP_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          echo "$FTP_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Remover la passphrase de la llave SSH
          ssh-keygen -p -P "$FTP_KEY_PASSPHRASE" -N "" -f ~/.ssh/id_rsa
          
          # Usar scp para copiar los archivos compilados directamente a public_html/sistema
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r build/* $FTP_USERNAME@$FTP_SERVER:public_html/sistema/
